<div class="container mt-4">
  <div class="row mb-4">
    <div class="col-12">
      <button class="btn btn-success" (click)="create()">
                + Lägg till ny bok
      </button>
    </div>
  </div>
  <div class="row">
    <div
      class=" col-12 col-md-6 col-lg-4 mb-3"
      *ngFor="let b of books">
      <div class="card h-100 shadow">
        <div class="card-body">
          <h5>
            {{ b.title }}
          </h5>
          <p>
            {{ b.author }}
          </p>
          <p class="text-muted small">
            Publicerad: {{ b.publishDate | date: 'yyyy-MM-dd' }}
          </p>
          <div class="d-flex gap-2 mt-3">
            <button
              class="btn btn-warning btn-sm flex-fill w-50"
              (click)="edit(b.id)">
              Redigera
            </button>
            <app-delete-book
              class="flex-fill"
              [bookId]="b.id"
              [bookTitle]="b.title"
              (deleted)="handleDelete($event)">
            </app-delete-book>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
