<div class="container mt-4">
  <h1>Book List</h1>

  <button class="btn btn-primary mb-3" (click)="create()">
    Add Book
  </button>

  <div class="card mb-2" *ngFor="let b of books">

    <div class="card-body">

      <h5>{{ b.title }}</h5>
      <p>{{ b.author }}</p>

      <button class="btn btn-warning me-2" (click)="edit(b.id)">
        Edit
      </button>

      <button class="btn btn-danger" (click)="delete(b.id)">
        Delete
      </button>

    </div>

  </div>

</div>
