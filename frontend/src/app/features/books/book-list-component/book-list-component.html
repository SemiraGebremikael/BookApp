<div class="container mt-4">

  <div class="row">

    <div
      class="col-12 col-md-6 col-lg-4 mb-3"
      *ngFor="let b of books">

      <div class="card h-100 shadow">

        <div class="card-body">

          <h5>
            {{ b.title }}
          </h5>

          <p>
            {{ b.author }}
          </p>

          <button class="btn btn-warning me-2" (click)="edit(b.id)">
            Edit
          </button>

          <button class="btn btn-danger" (click)="delete(b.id)">
            Delete
          </button>

        </div>

      </div>

    </div>

  </div>

</div>
