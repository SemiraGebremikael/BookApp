<div class="container mt-5">

  <div class="card p-4">

    <h2 class="mb-3">
      Register
    </h2>

    <input
      class="form-control mb-2"
      placeholder="Username"
      [(ngModel)]="model.username">

    <input
      class="form-control mb-3"
      type="password"
      placeholder="Password"
      [(ngModel)]="model.password">

    <button
      class="btn btn-success"
      (click)="register()">

      Register

    </button>

  </div>

</div>
