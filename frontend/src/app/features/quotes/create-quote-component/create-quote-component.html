<div class="container mt-4">
  <h3>+ Lägg till citat</h3>
  <div class="alert alert-info" *ngIf="message">{{ message }}</div>
  <form (ngSubmit)="submit()">
       <div *ngIf="showWarning" class="alert alert-danger"> 
      Vänligen fyll i citatet
    </div>
    <div class="mb-3">
      <label class="form-label">Citat</label>
      <textarea
        class="form-control"
        rows="4"
        [(ngModel)]="quoteText"
        name="quoteText"
        required
      ></textarea>
    </div>
    <button class="btn btn-success me-2" type="submit" [disabled]="isLoading">
      Spara
    </button>
    <button class="btn btn-secondary" type="button" (click)="cancel()">
      Avbryt
    </button>
  </form>
</div>
