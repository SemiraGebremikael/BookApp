<div class="container mt-4">
  <div class="row mb-4">
    <div class="col-12">
      <button class="btn btn-success" (click)="create()">
        + Lägg till nytt citat
      </button>
    </div>
  </div>

  <div *ngIf="message" class="alert alert-info">{{ message }}</div>

  <div class="row">
    <div
      class="col-12 col-md-6 col-lg-4 mb-3"
      *ngFor="let q of quotes"
    >
      <div class="card h-100 shadow">
        <div class="card-body">
          <p class="card-text">“{{ q.text }}”</p>
          <button class="btn btn-warning me-2" (click)="edit(q.id)">
            Redigera
          </button>
          <app-delete-quote
            [quoteId]="q.id"
            [quoteText]="q.text"
            (deleted)="handleDelete($event)"
          ></app-delete-quote>
        </div>
      </div>
    </div>
  </div>
</div>
