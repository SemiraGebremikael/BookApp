<button
  type="button"
  class="btn btn-outline-light btn-sm ms-2 theme-toggle"
  (click)="toggle()"
  [attr.aria-label]="'Växla tema (nu: ' + modeLabel() + ') '"
>
  <i class="fa-solid" [ngClass]="theme.mode() === 'dark' ? 'fa-sun' : 'fa-moon'" aria-hidden="true"></i>
  <span class="d-none d-sm-inline">Tema</span>
</button>
